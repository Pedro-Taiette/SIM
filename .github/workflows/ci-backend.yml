name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore backend/SIM.slnx

      - name: Build
        run: dotnet build backend/SIM.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/SIM.slnx --no-build --configuration Release
